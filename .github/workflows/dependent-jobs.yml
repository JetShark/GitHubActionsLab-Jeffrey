name: Dependent Jobs Workflow

on:
  # Triggers the workflow on push request events but only for the "main" branch.
  push:
     branches: [ "main" ]

# This workflow run is made up of three jobs that run sequentially, depending on the success of the previous job.
jobs:
  Build:
    name: Build application
    runs-on: ubuntu-latest


    steps:
      - name: Build
        run: |
          echo Building application...
          sleep 15

      - name: Build Success
        run: echo Build completed!

  Test:
    name: Test built application
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Run Tests
        run: |
          echo Running tests...
          sleep 15
        
      - name: Retry Failed Tests
        run: |
          echo Rerunning test 3...
          sleep 5
        
      - name: Test Success
        run: echo All tests passed!
    
  Deploy:
      name: Deploy tested application
      runs-on: ubuntu-latest
      needs: Test
  
      steps:
        - name: Start deployment
          run: |
            echo Connecting to AWS...
            sleep 5
          
        - name: Deploy application
          run: |
            echo Deploying application...
            sleep 15
          
        - name: Deploy Success
          run: echo Application deployed remotely!