name: Environment Variables and Secrets Workflow

on:
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

# This workflow is made up of two jobs that run sequentially, simulating an AWS deployment and a demonstration of variable scope.
env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    
    env:
      DEPLOYMENT_NAME: rickshaw-deployment

    steps:
      - name: Print area and application branch
        run: |
          echo "Region: $AWS_REGION"
          echo "Environment: $ENVIRONMENT"

      - name: Access AWS Secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Using AWS Access Key ID: $AWS_ACCESS_KEY_ID"
          echo "Using AWS Secret Access Key: $AWS_SECRET_ACCESS_KEY"

      - name: Log Command Time
        run: |
            DYNAMIC_VAR=$(date +'%Y-%m-%d %H:%M:%S')
            echo "Command Time: $DYNAMIC_VAR"

      - name: Upload Assets to S3
        env:
            S3_BUCKET_PATH: s3://my-app-assets/v1.0.2/
        run: |
            echo "Uploading files to $S3_BUCKET_PATH..."

      - name: Demonstrate variable scope
        run: |
            echo "Workflow-level variable (Accessible throughout): $AWS_REGION"
            echo "Job-level variable (Accessible within this job): $DEPLOYMENT_NAME"
            echo "Step-level variable (Not accessible here): $S3_BUCKET_PATH"

  demonstrate-variable-scope:
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    steps:
      - name: Attempt to access variables
        run: |
          echo "Workflow-level variable (Still accessible): $AWS_REGION"
          echo "Job-level variable from 'deploy-to-aws' (Not accessible): $DEPLOYMENT_NAME"
          echo "Step-level variable from previous job (Not accessible): $S3_BUCKET_PATH"        